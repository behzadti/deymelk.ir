<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deymelk.ir - دامنه برای فروش</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 50px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        .domain {
            font-size: 2.8em;
            color: #e74c3c;
            margin: 25px 0;
            word-break: break-all;
        }
        .price {
            font-size: 2em;
            color: #27ae60;
            font-weight: bold;
        }
        .info {
            text-align: right;
            line-height: 1.8;
            margin: 30px 0;
            font-size: 1.1em;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            margin: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>این دامنه برای فروش است</h1>
        
        <div class="domain">deymelk.ir</div>
        
        <div class="price">قیمت: ___ دلار</div>
        
        <div class="info">
            <p><strong>ویژگی‌ها:</strong></p>
            <p>• دامنه کوتاه و به‌یادماندنی<br>
               • مناسب برندینگ قوی<br>
               • مناسب کسب‌وکارهای مختلف</p>
        </div>

        <h2>برای خرید تماس بگیرید:</h2>
        <p>تلگرام: <strong>@yourusername</strong></p>
        <p>ایمیل: <strong>your@email.com</strong></p>
        
        <button onclick="window.location.href='https://t.me/yourusername'">پیام در تلگرام</button>
        <button onclick="window.location.href='mailto:your@email.com'">ارسال ایمیل</button>
    </div>
</body>
</html>
